<!DOCTYPE html>
<html>

<body>
  
<style>
body {
    background-color: blue;
          color: white;
  
      display: flex;
    justify-content: center;
    align-items: center;

    height: 100vh;
    margin: 0;
}

.card {
    background-color: red;
    color: white;

    width: 400px;
    padding: 30px;

    border-radius: 15px;

    text-align: center;

    box-shadow: 0px 0px 20px red;
}

</style>

<div class="card">
  
<h1 id="title">Hi my name is Chrisnel!</h1>

<button onclick="changeText()">
Continue
</button>

</div>
  
<script>

  let step= 0;
    
function changeText() {

  step++;

  if(step == 1) {
    
    document.getElementById("title").innerHTML =
    "I wish I can perfect my study in programing!";
    
     document.body.style.backgroundColor = "red";
}
  
   else if(step == 2) {

    document.getElementById("title").innerHTML =
    "Thank you";

    document.body.style.backgroundColor = "orange";
}

}
  
</script>

</body>
</html>
